version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: cloud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend-api:
    build: ./backend
    image: cloud-backend:latest
    container_name: cloud-backend-api
    command: npm start
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
      - STORAGE_PATH=/app/storage
    volumes:
      - ./storage:/app/storage
      - F:\:/host_d
    depends_on:
      - redis
    restart: unless-stopped

  backend-worker:
    image: cloud-backend:latest
    container_name: cloud-backend-worker
    command: npm run start:worker
    environment:
      - REDIS_HOST=redis
      - API_HOST=backend-api
      - STORAGE_PATH=/app/storage
    volumes:
      - ./storage:/app/storage
      - F:\:/host_d 
    depends_on:
      - backend-api
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cloud-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  redis_data:
